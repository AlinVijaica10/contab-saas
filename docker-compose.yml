services:
  postgres:
    image: postgres:16
    container_name: contab-saas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: contab_user
      POSTGRES_PASSWORD: contab_pass
      POSTGRES_DB: contab_saas
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
