<div class="client-form">
  <h2>{{ isEditMode ? 'Editează client' : 'Adaugă client' }}</h2>

  <form [formGroup]="form" (ngSubmit)="onSubmit()">
    <div class="field">
      <label for="companyName">Nume firmă *</label>
      <input id="companyName" type="text" formControlName="companyName">
    </div>

    <div class="field">
      <label for="cui">CUI</label>
      <input id="cui" type="text" formControlName="cui">
    </div>

    <div class="field">
      <label for="contactEmail">Email contact *</label>
      <input id="contactEmail" type="email" formControlName="contactEmail">
    </div>

    <div class="field">
      <label for="phoneNumber">Telefon (pentru WhatsApp)</label>
      <input id="phoneNumber" type="tel" formControlName="phoneNumber" placeholder="+40712345678">
    </div>

    <div class="field">
      <label for="contactPerson">Persoană de contact</label>
      <input id="contactPerson" type="text" formControlName="contactPerson">
    </div>

    <div class="field">
      <label for="status">Status</label>
      <select id="status" formControlName="status">
        <option value="active">Activ</option>
        <option value="inactive">Inactiv</option>
      </select>
    </div>

    <hr>
    <h3>Profil fiscal</h3>

    <div class="field">
      <label for="clientType">Tip client *</label>
      <select id="clientType" formControlName="clientType">
        <option value="SRL">SRL</option>
        <option value="PFA">PFA</option>
      </select>
    </div>

    <div class="field">
      <label for="fiscalRegime">Regim fiscal *</label>
      @if (isSrl) {
        <select id="fiscalRegime" formControlName="fiscalRegime">
          <option value="MICRO">Micro (impozit pe venit)</option>
          <option value="PROFIT">Impozit pe profit</option>
        </select>
      } @else {
        <select id="fiscalRegime" formControlName="fiscalRegime">
          <option value="REAL">Sistem real</option>
          <option value="NORMA_VENIT">Normă de venit</option>
        </select>
      }
    </div>

    <div class="field checkbox-field">
      <label>
        <input type="checkbox" formControlName="isVatPayer">
        Plătitor de TVA
      </label>
    </div>

    @if (isVatPayer) {
      <div class="field">
        <label for="vatPeriodicity">Periodicitate TVA</label>
        <select id="vatPeriodicity" formControlName="vatPeriodicity">
          <option value="MONTHLY">Lunar</option>
          <option value="QUARTERLY">Trimestrial</option>
        </select>
      </div>
    }

    <div class="field checkbox-field">
      <label>
        <input type="checkbox" formControlName="hasEmployees">
        Are angajați
      </label>
    </div>

    <hr>
    <h3>Facturare lunară automată</h3>

    <div class="field">
      <label for="monthlyFee">Tarif lunar (RON)</label>
      <input id="monthlyFee" type="number" step="0.01" formControlName="monthlyFee" placeholder="Lasă gol dacă nu se aplică">
    </div>

    <div class="field">
      <label for="monthlyFeeVatRate">TVA pentru serviciul lunar (%)</label>
      <input id="monthlyFeeVatRate" type="number" step="1" formControlName="monthlyFeeVatRate">
    </div>

    <div class="field">
      <label for="monthlyFeeDescription">Descriere pe factură</label>
      <input id="monthlyFeeDescription" type="text" formControlName="monthlyFeeDescription">
    </div>

    <hr>
    <h3>Adresă (necesară pentru e-Factura)</h3>

    <div class="field">
      <label for="addressStreet">Stradă și număr</label>
      <input id="addressStreet" type="text" formControlName="addressStreet" placeholder="Str. Exemplu nr. 10">
    </div>

    <div class="field">
      <label for="addressCity">Localitate</label>
      <input id="addressCity" type="text" formControlName="addressCity">
    </div>

    <div class="field">
      <label for="addressCounty">Județ (cod NUTS)</label>
      <input id="addressCounty" type="text" formControlName="addressCounty" placeholder="ex: RO-MH pentru Mehedinți">
    </div>

    <div class="field">
      <label for="addressPostalCode">Cod poștal</label>
      <input id="addressPostalCode" type="text" formControlName="addressPostalCode">
    </div>

    <div class="field">
      <label for="addressCountry">Țară</label>
      <input id="addressCountry" type="text" formControlName="addressCountry">
    </div>

    <div class="field">
      <label for="iban">IBAN</label>
      <input id="iban" type="text" formControlName="iban" placeholder="RO00XXXX0000000000000000">
    </div>

    @if (error) {
      <p class="error">{{ error }}</p>
    }

    <button type="submit" [disabled]="form.invalid || submitting">
      {{ submitting ? 'Se salvează...' : 'Salvează' }}
    </button>
  </form>
</div>
